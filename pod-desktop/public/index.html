<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BEWA Sprinter POD</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
    .hidden { display: none !important; }
    .card-shadow { box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05); }
    /* Native App feel */
    input[type="file"] { display: none; }
  </style>
</head>
<body class="text-slate-800">

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="min-h-screen flex flex-col justify-center px-6 bg-white">
    <div class="text-center mb-10">
      <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-blue-200">
        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
      </div>
      <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Sprinter POD</h1>
      <p class="text-slate-500 mt-2">Login dengan kode unik Anda</p>
    </div>
    
    <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100 card-shadow">
      <input type="text" id="login-code" placeholder="Masukkan Kode J&T" class="w-full text-center text-xl font-bold uppercase tracking-widest px-4 py-4 rounded-xl border-2 border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none mb-4 transition">
      <button onclick="login()" class="w-full bg-blue-600 active:bg-blue-700 text-white font-bold text-lg py-4 rounded-xl shadow-lg shadow-blue-200 flex items-center justify-center gap-2 transition-transform transform active:scale-95">
        MULAI BEKERJA
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
      </button>
    </div>
  </div>

  <!-- DASHBOARD SCREEN -->
  <div id="dashboard-screen" class="hidden min-h-screen flex flex-col">
    <div class="bg-blue-600 text-white px-6 pt-8 pb-12 rounded-b-3xl shadow-md relative">
      <div class="flex justify-between items-start mb-6">
        <div>
          <p class="text-blue-200 text-sm font-medium">Selamat Bekerja,</p>
          <h2 id="sprinter-name" class="text-2xl font-bold tracking-tight">Nama Sprinter</h2>
        </div>
        <button onclick="logout()" class="p-2 bg-blue-700 rounded-full active:bg-blue-800">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
        </button>
      </div>

      <div class="grid grid-cols-2 gap-4 absolute -bottom-10 left-6 right-6">
        <div class="bg-white rounded-2xl p-4 shadow-lg flex flex-col items-center">
          <span class="text-slate-500 text-xs font-bold uppercase mb-1">Selesai</span>
          <span id="count-done" class="text-3xl font-black text-green-500">0</span>
        </div>
        <div class="bg-white rounded-2xl p-4 shadow-lg border-b-4 border-orange-500 flex flex-col items-center">
          <span class="text-slate-500 text-xs font-bold uppercase mb-1">Pending</span>
          <span id="count-pending" class="text-3xl font-black text-orange-500">0</span>
        </div>
      </div>
    </div>

    <div class="pt-16 pb-24 px-6 flex-1 overflow-auto">
       <div class="mb-4 relative">
         <input type="text" id="search-awb" oninput="handleSearchInput()" placeholder="Cari No. Resi..." class="w-full px-5 py-3.5 pr-12 rounded-[1rem] border-2 border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none text-sm font-bold tracking-widest uppercase shadow-sm transition">
         <button id="clear-search" onclick="clearSearch()" class="hidden absolute right-4 top-1/2 -translate-y-1/2 p-1.5 bg-slate-100 hover:bg-slate-200 rounded-full text-slate-500 transition active:scale-95">
           <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
         </button>
       </div>
       <h3 class="font-bold text-slate-800 text-lg mb-4">Daftar Paket Tertunda</h3>
       <div id="task-list" class="space-y-4">
         <!-- Tasks injected here -->
       </div>
       <div id="pagination-control" class="mt-8 pb-10 hidden">
         <button onclick="loadMore()" class="w-full py-4 bg-white border-2 border-slate-200 text-slate-600 font-bold rounded-2xl active:bg-slate-50 transition shadow-sm">MUAT LEBIH BANYAK...</button>
       </div>
    </div>
  </div>

  <!-- UPLOAD SCREEN (Overlay) -->
  <div id="upload-screen" class="hidden fixed inset-0 z-50 bg-slate-50 flex flex-col">
    <div class="bg-white px-4 py-4 flex items-center border-b border-slate-200 shadow-sm">
      <button onclick="closeUpload()" class="p-2 mr-2 active:bg-slate-100 rounded-full">
        <svg class="w-6 h-6 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
      </button>
      <h2 class="font-bold text-lg text-slate-800">Upload Bukti POD</h2>
    </div>

    <div class="flex-1 overflow-auto p-6">
      <div class="bg-blue-50 border border-blue-100 p-4 rounded-xl mb-6">
        <p class="text-xs text-blue-500 font-bold uppercase tracking-wider mb-1">WAYBILL ID</p>
        <p id="upload-wb" class="text-2xl font-black text-blue-700 font-mono tracking-tight">...</p>
        <p id="upload-penerima" class="text-sm font-medium text-slate-700 mt-2">...</p>
        <p id="upload-alamat" class="text-xs text-slate-500 mt-1">...</p>
      </div>

      <div class="space-y-6">
        <!-- Image 1: Gabungan POD -->
        <div class="upload-box relative bg-white border-2 border-dashed border-slate-300 rounded-3xl p-6 text-center shadow-sm active:bg-slate-50 transition" onclick="handleBoxClick(1)">
          <input type="file" id="input-img1" accept="image/*" multiple onchange="previewImg(this, 'preview1')" class="hidden">
          <div id="placeholder1" class="flex flex-col items-center justify-center">
            <div class="w-14 h-14 bg-indigo-50 rounded-full flex items-center justify-center mb-3">
              <svg class="w-7 h-7 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2-2v12a2 2 0 002 2z"></path></svg>
            </div>
            <p class="font-bold text-slate-700">1. Upload Gabungan POD</p>
            <p class="text-xs text-slate-400 mt-1">Pilih dari Galeri</p>
          </div>
          <img id="preview1" class="hidden absolute inset-0 w-full h-full object-cover rounded-3xl pointer-events-none">
        </div>

        <!-- Image 2: Fisik Paket (Kamera Biasa) -->
        <div class="upload-box relative bg-white border-2 border-dashed border-slate-300 rounded-3xl p-6 text-center shadow-sm active:bg-slate-50 transition" onclick="handleBoxClick(2)">
          <!-- capture="environment" to directly open camera -->
          <input type="file" id="input-img2" accept="image/*" capture="environment" onchange="previewImg(this, 'preview2')" class="hidden">
          <div id="placeholder2" class="flex flex-col items-center justify-center">
            <div class="w-14 h-14 bg-emerald-50 rounded-full flex items-center justify-center mb-3">
              <svg class="w-7 h-7 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </div>
            <p class="font-bold text-slate-700">2. Foto Paket Fisik</p>
            <p class="text-xs text-slate-400 mt-1">Buka Kamera</p>
          </div>
          <img id="preview2" class="hidden absolute inset-0 w-full h-full object-cover rounded-3xl pointer-events-none">
        </div>
      </div>
    </div>
    
    <div class="p-6 bg-white border-t border-slate-100 shadow-[0_-10px_20px_rgba(0,0,0,0.03)]">
      <button id="btn-submit" onclick="submitUpload()" class="w-full bg-blue-600 active:bg-blue-700 text-white font-bold text-lg py-4 rounded-xl shadow-lg transition disabled:opacity-50 disabled:active:bg-blue-600 flex items-center justify-center">
        KIRIM DATA POD
      </button>
    </div>
  </div>

  <!-- IMAGE REVIEW OVERLAY -->
  <div id="image-review-overlay" class="hidden fixed inset-0 z-[100] bg-black flex flex-col transition-opacity">
    <div class="p-4 flex justify-between items-center text-white bg-black/60 absolute top-0 left-0 right-0 z-10 backdrop-blur-md">
      <h3 class="font-bold tracking-widest text-sm uppercase">Cek Kualitas Foto</h3>
      <button onclick="closeImageReview()" class="p-3 bg-white/10 rounded-full active:bg-white/20 transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>
    <div class="flex-1 flex items-center justify-center p-4">
      <img id="image-review-img" src="" class="max-w-full max-h-full object-contain">
    </div>
    <div class="p-6 pb-8 text-center bg-gradient-to-t from-black to-transparent absolute bottom-0 left-0 right-0">
      <button onclick="triggerReupload()" class="px-6 py-4 bg-red-500 active:bg-red-600 text-white rounded-2xl font-bold shadow-lg w-full mb-3 tracking-widest uppercase transition">Foto Buram? Ganti Foto</button>
      <button onclick="closeImageReview()" class="px-6 py-4 bg-white active:bg-slate-200 text-slate-800 rounded-2xl font-black w-full tracking-widest uppercase transition">FOTO SUDAH JELAS</button>
    </div>
  </div>

  <!-- Scripts -->
  <script>
    let currentCode = localStorage.getItem('sprinter_code');
    let currentName = localStorage.getItem('sprinter_name');
    let currentWaybill = null;
    let file1 = null, file2 = null;
    let allTasks = [];
    let filteredTasks = [];
    let pageSize = 20;
    let currentPage = 1;

    // Check if logged in
    if (currentCode && currentName) {
      showDashboard();
    }

    async function login() {
      const code = document.getElementById('login-code').value.trim().toUpperCase();
      if (!code) return alert("Masukkan kode J&T");
      
      const btn = document.querySelector('#login-screen button');
      const ogText = btn.innerHTML;
      btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;

      try {
        const res = await fetch('/api/mobile/login', {
          method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ code })
        });
        const data = await res.json();
        
        if (data.success) {
          localStorage.setItem('sprinter_code', code);
          localStorage.setItem('sprinter_name', data.name);
          currentCode = code; currentName = data.name;
          showDashboard();
        } else {
          alert(data.message);
        }
      } catch (err) {
        alert("Gagal konek server: " + err.message);
      } finally {
        btn.innerHTML = ogText;
      }
    }

    function logout() {
      localStorage.removeItem('sprinter_code');
      localStorage.removeItem('sprinter_name');
      document.getElementById('dashboard-screen').classList.add('hidden');
      document.getElementById('login-screen').classList.remove('hidden');
    }

    async function showDashboard() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('dashboard-screen').classList.remove('hidden');
      document.getElementById('sprinter-name').textContent = currentName;
      loadTasks();
    }

    async function loadTasks() {
      try {
        const res = await fetch(`/api/mobile/tasks?code=${currentCode}`);
        const data = await res.json();
        
        if (data.success) {
          allTasks = data.data.sort((a, b) => {
            if (!a.waktu_sampai) return 1;
            if (!b.waktu_sampai) return -1;
            return new Date(a.waktu_sampai) - new Date(b.waktu_sampai);
          });
          resetAndFilterTasks();
        }
      } catch (err) {
        console.error("Task load error", err);
      }
    }

     function resetAndFilterTasks() {
       const q = document.getElementById('search-awb').value.toUpperCase();
       filteredTasks = allTasks.filter(t => t.waybill_id.includes(q));
       currentPage = 1;
       renderTasks();
     }

     function loadMore() {
       currentPage++;
       renderTasks(true);
     }

     function renderTasks(append = false) {
       let done = 0, pending = 0;
       allTasks.forEach(t => { if (t.status === 'COMPLETED') done++; else pending++; });
       document.getElementById('count-done').textContent = done;
       document.getElementById('count-pending').textContent = pending;

       const end = currentPage * pageSize;
       const tasksToShow = filteredTasks.slice(0, end);
       
       const hasMore = end < filteredTasks.length;
       const paginationControl = document.getElementById('pagination-control');
       if (hasMore) paginationControl.classList.remove('hidden'); else paginationControl.classList.add('hidden');

       let html = '';
       tasksToShow.forEach(t => {
         const isDone = t.status === 'COMPLETED';
         const isRejected = t.status === 'REJECTED';
         const bgClass = isDone ? 'bg-green-50 border-green-200' : (isRejected ? 'bg-red-50 border-red-200' : 'bg-white border-slate-200');
         
         const action = isDone 
           ? `<div class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center text-green-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg></div>`
           : `<button onclick="openUpload('${t.waybill_id}', '${t.penerima}', '${t.drop_point || t.kecamatan_penerima}')" class="px-4 py-2 ${isRejected ? 'bg-red-600 text-white' : 'bg-blue-100 text-blue-700'} font-bold rounded-lg text-sm flex items-center gap-2 active:bg-blue-200"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg> ${isRejected ? 'PERBAIKI' : 'UPLOAD'}</button>`;

         let rejectionNote = "";
         if (isRejected) {
             rejectionNote = `<div class="mt-2 p-2 bg-red-100 text-red-700 text-[10px] font-bold rounded-lg border border-red-200 uppercase tracking-tighter">ALASAN REJECT: ${t.rejection_reason}</div>`;
         }

         // Formatting arrival date
         let arrivalDate = "";
         if (t.waktu_sampai) {
             const dt = new Date(t.waktu_sampai);
             const now = new Date();
             const diff = Math.floor((now - dt) / (1000 * 60 * 60 * 24));
             const dateStr = dt.toLocaleDateString('id-ID', { day:'numeric', month:'short' });
             const colorClass = diff >= 3 ? 'text-red-500 font-bold' : 'text-slate-400';
             arrivalDate = `<div class="flex items-center gap-1 ${colorClass} text-[10px] mt-1 uppercase tracking-wider">
               <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
               Sampai: ${dateStr} (${diff} hr)
             </div>`;
         }

         html += `
           <div class="task-item border ${bgClass} rounded-2xl p-4 flex justify-between items-center shadow-sm" data-wb="${t.waybill_id}">
             <div class="flex-1 mr-2">
               <div class="flex items-center gap-2">
                 <h4 class="font-mono font-bold text-slate-800 tracking-tight">${t.waybill_id}</h4>
                 ${isRejected ? '<span class="text-[8px] bg-red-600 text-white px-1.5 rounded-full font-black uppercase">REJECTED</span>' : ''}
               </div>
               <p class="text-sm font-semibold text-slate-600 mt-1">${t.penerima && t.penerima !== 'null' ? t.penerima : '<span class="italic text-slate-400">Nama Kosong / Belum Scan</span>'}</p>
               <p class="text-xs text-slate-400 mt-0.5 font-bold uppercase tracking-widest">${t.drop_point || t.kecamatan_penerima || ''}</p>
               ${arrivalDate}
               ${rejectionNote}
             </div>
             <div>${action}</div>
           </div>
         `;
       });

       document.getElementById('task-list').innerHTML = html || '<p class="text-center text-slate-400 mt-10">Tidak ada paket sesuai pencarian.</p>';
     }

     function handleSearchInput() {
       const q = document.getElementById('search-awb').value.toUpperCase();
       const clearBtn = document.getElementById('clear-search');
       if (q) clearBtn.classList.remove('hidden'); else clearBtn.classList.add('hidden');
       resetAndFilterTasks();
     }

     function clearSearch() {
       document.getElementById('search-awb').value = '';
       handleSearchInput();
     }

     function openUpload(wb, nama, area) {
       currentWaybill = wb;
       document.getElementById('upload-wb').textContent = wb;
       document.getElementById('upload-penerima').textContent = nama || '-';
       document.getElementById('upload-alamat').textContent = area || '-';
       
       file1 = null; file2 = null;
       document.getElementById('input-img1').value = '';
       document.getElementById('input-img2').value = '';
       document.getElementById('preview1').classList.add('hidden');
       document.getElementById('preview2').classList.add('hidden');
       document.getElementById('placeholder1').classList.remove('hidden');
       document.getElementById('placeholder2').classList.remove('hidden');

       document.getElementById('upload-screen').classList.remove('hidden');
     }

     function closeUpload() {
       document.getElementById('upload-screen').classList.add('hidden');
     }

     function handleBoxClick(num) {
       const file = num === 1 ? file1 : file2;
       if (!file) {
         document.getElementById(`input-img${num}`).click();
       } else {
         document.getElementById('image-review-img').src = document.getElementById(`preview${num}`).src;
         document.getElementById('image-review-overlay').classList.remove('hidden');
         document.getElementById('image-review-overlay').dataset.currentImg = num;
       }
     }

     function closeImageReview() {
       document.getElementById('image-review-overlay').classList.add('hidden');
     }

     function triggerReupload() {
       const num = document.getElementById('image-review-overlay').dataset.currentImg;
       document.getElementById(`input-img${num}`).click();
       closeImageReview();
     }

     function previewImg(input, pref) {
       if (!input.files || input.files.length === 0) return;
       const imgElement = document.getElementById(pref);
       const placeholder = document.getElementById('placeholder' + pref.slice(-1));

       if (pref === 'preview1' && input.files.length > 1) {
         const btn = document.getElementById('btn-submit');
         const ogText = btn.innerHTML;
         btn.innerHTML = 'MENGGABUNGKAN FOTO...';
         btn.disabled = true;
         const files = Array.from(input.files);
         const images = [];
         let loaded = 0;
         files.forEach(file => {
           const img = new Image();
           img.onload = () => { loaded++; if (loaded === files.length) mergeImages(images, imgElement, placeholder, btn, ogText); };
           img.src = URL.createObjectURL(file);
           images.push(img);
         });
       } else {
         if (pref === 'preview1') file1 = input.files[0];
         if (pref === 'preview2') file2 = input.files[0];
         const reader = new FileReader();
         reader.onload = function(e) { imgElement.src = e.target.result; imgElement.classList.remove('hidden'); placeholder.classList.add('hidden'); }
         reader.readAsDataURL(input.files[0]);
       }
     }

     function mergeImages(images, imgElement, placeholder, btn, ogText) {
       const canvas = document.createElement('canvas');
       const ctx = canvas.getContext('2d');
       const MAX_HEIGHT = 1200;
       let scaledImages = images.map(img => {
           let scale = 1;
           if (img.height > MAX_HEIGHT) scale = MAX_HEIGHT / img.height;
           return { img: img, width: img.width * scale, height: img.height * scale };
       });
       const totalWidth = scaledImages.reduce((acc, scaled) => acc + scaled.width, 0);
       const maxHeight = Math.max(...scaledImages.map(scaled => scaled.height));
       canvas.width = totalWidth; canvas.height = maxHeight;
       let currentX = 0;
       scaledImages.forEach(scaled => {
         const yOffset = (maxHeight - scaled.height) / 2;
         ctx.drawImage(scaled.img, currentX, yOffset, scaled.width, scaled.height);
         currentX += scaled.width;
         URL.revokeObjectURL(scaled.img.src);
       });
       const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
       imgElement.src = dataUrl; imgElement.classList.remove('hidden'); placeholder.classList.add('hidden');
       file1 = dataURItoBlob(dataUrl);
       btn.innerHTML = ogText; btn.disabled = false;
     }

     function dataURItoBlob(dataURI) {
       const byteString = atob(dataURI.split(',')[1]);
       const mimeString = dataURI.split(',')[0].split(':')[1].split(';')[0];
       const ab = new ArrayBuffer(byteString.length);
       const ia = new Uint8Array(ab);
       for (let i = 0; i < byteString.length; i++) { ia[i] = byteString.charCodeAt(i); }
       return new File([ab], "merged_pod.jpg", {type: mimeString});
     }

     async function compressImage(file, maxSize = 1200) { return new Promise((resolve) => { const reader = new FileReader(); reader.onload = (e) => { const img = new Image(); img.onload = () => { const canvas = document.createElement('canvas'); let width = img.width; let height = img.height; if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; } } else { if (height > maxSize) { width *= maxSize / height; height = maxSize; } } canvas.width = width; canvas.height = height; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height); canvas.toBlob((blob) => { resolve(new File([blob], file.name, { type: 'image/jpeg' })); }, 'image/jpeg', 0.8); }; img.src = e.target.result; }; reader.readAsDataURL(file); }); } async function submitUpload() {
       if (!file1 || !file2) return alert("Harap masukkan kedua gambar!");
       const btn = document.getElementById('btn-submit');
       const ogText = btn.innerHTML;
       btn.innerHTML = 'MENGIRIM...'; btn.disabled = true;
       const fd = new FormData();
       fd.append('code', currentCode); fd.append('waybill', currentWaybill);
       fd.append('image1', file1); fd.append('image2', file2);
       try {
         const res = await fetch('/api/mobile/upload', { method: 'POST', body: fd });
         const data = await res.json();
         if(data.success) { closeUpload(); loadTasks(); } else { alert(data.message); }
       } catch (err) { alert("Gagal upload: " + err.message); } finally { btn.innerHTML = ogText; btn.disabled = false; }
     }
  </script>
